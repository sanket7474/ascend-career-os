version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ascend-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ascend-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ascend
      SPRING_DATASOURCE_USERNAME: ascend
      SPRING_DATASOURCE_PASSWORD: ascend
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: ascend-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ascend
      POSTGRES_USER: ascend
      POSTGRES_PASSWORD: ascend
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
